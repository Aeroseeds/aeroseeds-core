# Nginx server blocks for the Aeroseeds VPS deployment.
#
# Install: copy (or symlink) this file into your existing Nginx setup, e.g.
#   sudo cp deploy/nginx-thanos.conf /etc/nginx/sites-available/aeroseeds
#   sudo ln -s /etc/nginx/sites-available/aeroseeds /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# then run certbot (see DEPLOY.md) to fill in the SSL lines below.
#
# If this box already runs Nginx for other projects, just make sure nothing
# else is using these two server_names -- ports 80/443 stay shared as usual.

server {
    listen 80;
    listen [::]:80;
    server_name thanos.aeroseeds.io;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.thanos.aeroseeds.io;

    # Scans, batch uploads, and PDF report generation can run long and carry
    # large multipart bodies -- default Nginx limits (1m body, 60s read) are
    # too tight for this API.
    client_max_body_size 100m;
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
