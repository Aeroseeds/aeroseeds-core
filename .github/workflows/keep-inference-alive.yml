name: Keep inference service warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping inference service
        run: curl -sS -m 60 -o /dev/null -w "status: %{http_code}\n" https://aeroseeds-inference.onrender.com/ || true
